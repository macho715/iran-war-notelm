name: Urgentdash Backup Checks

on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  backup-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Smoke check backup script (dry-run)
        env:
          STORAGE_ROOT: ${{ runner.temp }}/urgentdash-backup-ci
        run: |
          python scripts/backup_urgentdash.py urgentdash/urgentdash_snapshot.example.json --dry-run

      - name: Run targeted tests
        run: |
          pytest -q tests/test_storage_layout.py tests/test_backup_urgentdash.py
