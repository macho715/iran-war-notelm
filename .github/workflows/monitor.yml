name: Iran-UAE Monitor (hourly)

on:
  push:
    branches:
      - main
      - feature/hyie-realtime-hotfix-pack
  schedule:
    # GitHub Actions schedule runs in UTC. Avoid 00 minute to reduce queue contention.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run monitor once (canonical)
        env:
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Twilio WhatsApp (optional)
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}

          # Storage backend (Phase 4)
          # - If DATABASE_URL is set, backend auto switches to 'postgres'.
          # - If empty, it stays sqlite (local file).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          STORAGE_ENABLED: "true"

          # Runtime
          HEADLESS: "true"
          LOG_LEVEL: "INFO"

          # Phase 2 (NotebookLM): cloud default = false for stability.
          # Override by setting secret PHASE2_ENABLED to "true".
          PHASE2_ENABLED: ${{ secrets.PHASE2_ENABLED != '' && secrets.PHASE2_ENABLED || 'false' }}
          # Optional: set APPROVE_SEND=APPROVE_SEND when using non-interactive forced sending
          APPROVE_SEND: ${{ secrets.APPROVE_SEND || '' }}
        run: |
          python scripts/run_now.py --telegram-send

      - name: Upload artifacts (reports/state/ledger) for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-artifacts-${{ github.run_id }}
          path: |
            reports
            state
            ledger
            .health_state.json
          if-no-files-found: ignore
          retention-days: 7
